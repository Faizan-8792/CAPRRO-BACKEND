<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>CA PRO Admin - Login</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --pri: #2563eb;
      --pri-light: #3b82f6;
      --pri-lighter: #dbeafe;
      --pri-dark: #1d4ed8;
      --gold: #f59e0b;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      animation: fadeUp 0.5s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 36px 32px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.07), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
    }

    .login-brand {
      font-size: 22px;
      font-weight: 800;
      color: var(--pri);
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }

    .login-brand span {
      color: var(--gold);
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .form-control {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus {
      border-color: var(--pri-light);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      outline: none;
    }

    .form-control::placeholder {
      color: #94a3b8;
    }

    .btn {
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      padding: 10px 18px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--pri);
      border: none;
      color: #fff;
      box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
    }

    .btn-primary:hover {
      background: var(--pri-dark);
      box-shadow: 0 4px 8px rgba(37, 99, 235, 0.3);
    }

    .btn-outline-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-outline-secondary:hover {
      background: var(--pri-lighter);
      border-color: var(--pri-light);
      color: var(--pri-dark);
    }

    .btn-success {
      background: #16a34a;
      border: none;
      color: #fff;
      box-shadow: 0 2px 4px rgba(22, 163, 74, 0.2);
    }

    .btn-success:hover {
      background: #15803d;
      box-shadow: 0 4px 8px rgba(22, 163, 74, 0.3);
    }

    #status {
      font-size: 13px;
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--pri-lighter);
      border: 1px solid #bfdbfe;
      min-height: 20px;
    }

    #status:empty {
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div class="login-brand">CA PRO <span>Toolkit</span></div>
      <p class="login-subtitle">Login using OTP. Your session token will be stored securely in the browser.</p>

      <label class="form-label">Email</label>
      <input id="email" type="email" class="form-control" placeholder="you@office.com" />

      <div class="d-flex gap-2 mt-3">
        <button id="sendOtp" class="btn btn-outline-secondary w-100" type="button">Send OTP</button>
        <button id="goVerify" class="btn btn-primary w-100" type="button">I have OTP</button>
      </div>

      <div id="otpBlock" style="display:none; margin-top:14px;">
        <label class="form-label mt-2">OTP Code</label>
        <input id="otp" type="text" class="form-control" placeholder="6-digit OTP" maxlength="6" />

        <button id="verifyOtp" class="btn btn-success w-100 mt-3" type="button">
          Verify & Login
        </button>
      </div>

      <div id="status" class="mt-3"></div>
    </div>
  </div>

  <script src="./admin/login.js?v=3"></script>

</body>
</html>
